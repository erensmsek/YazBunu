<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YazBunu — Yerel Konuşma-Metin Stüdyosu</title>
  <link rel="stylesheet" href="/assets/style.css?v=6" />
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="/">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="5" y1="10" x2="5" y2="14"/>
          <line x1="9.5" y1="6" x2="9.5" y2="18"/>
          <line x1="14" y1="3" x2="14" y2="21"/>
          <line x1="18.5" y1="8" x2="18.5" y2="16"/>
        </svg>
      </span>
      <span class="brand__name">YazBunu</span>
    </a>

    <div class="topbar__actions">
      <label class="pill pill--select">
        <span class="pill__label">Çeviri</span>
        <select id="targetLang">
          <option value="">Yok</option>
          <option value="tr">Türkçe</option>
          <option value="en">İngilizce</option>
          <option value="de">Almanca</option>
          <option value="fr">Fransızca</option>
          <option value="es">İspanyolca</option>
          <option value="it">İtalyanca</option>
          <option value="pt">Portekizce</option>
          <option value="ru">Rusça</option>
          <option value="ar">Arapça</option>
          <option value="zh">Çince</option>
          <option value="ja">Japonca</option>
          <option value="ko">Korece</option>
        </select>
      </label>

      <label class="pill pill--switch">
        <input type="checkbox" id="diarizeToggle" />
        <span class="switch" aria-hidden="true"></span>
        <span class="pill__label">Konuşmacı ayrımı</span>
      </label>

      <button id="themeToggle" class="icon-btn" type="button" aria-label="Temayı değiştir">
        <svg class="icon-btn__sun" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="icon-btn__moon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="shell">
    <section class="hero">
      <p class="hero__tagline">Konuş, anında yazıya dönüşsün.</p>

      <div class="tabs" role="tablist">
        <button class="tab is-active" data-tab="record" role="tab">Mikrofon</button>
        <button class="tab" data-tab="upload" role="tab">Dosya Yükle</button>
      </div>

      <section class="panel" data-panel="record">
        <div class="recorder" id="recorder">
          <button id="recordBtn" class="record-btn" aria-pressed="false" aria-label="Kaydı başlat/durdur">
            <span class="record-btn__dot"></span>
          </button>
          <canvas id="waveform" class="waveform" width="480" height="72" aria-hidden="true"></canvas>
        </div>
        <div class="record-status">
          <span id="recordTimer">00:00</span>
          <span id="recordHint">Kaydı başlatmak için tıkla</span>
        </div>
      </section>

      <section class="panel is-hidden" data-panel="upload">
        <label id="dropzone" class="dropzone" for="fileInput">
          <span class="dropzone__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </span>
          <span class="dropzone__text">Ses dosyasını buraya sürükle ya da seç</span>
          <span class="dropzone__hint">wav, mp3, m4a, webm...</span>
          <input id="fileInput" type="file" accept="audio/*" hidden />
        </label>
        <div id="fileName" class="file-name"></div>
      </section>
    </section>

    <div id="statusLine" class="status-line"></div>

    <section id="results" class="results is-hidden">
      <div class="results-main">
        <div class="result-block">
          <div class="result-block__head">
            <h2>Transkript <span id="detectedLang" class="lang-tag"></span></h2>
            <div class="ai-tools">
              <button id="summarizeBtn" class="ai-btn" type="button">
                <span class="ai-btn__icon" aria-hidden="true">✦</span> Özetle
              </button>
              <button id="polishBtn" class="ai-btn" type="button">
                <span class="ai-btn__icon" aria-hidden="true">✎</span> Başlıklandır &amp; İyileştir
              </button>
            </div>
          </div>
          <textarea id="fullText" class="full-text" readonly></textarea>
          <div class="segments" id="segments"></div>
          <div class="export-row" id="exportOriginal"></div>
        </div>

        <div class="result-block is-hidden" id="translationBlock">
          <div class="result-block__head">
            <h2>Çeviri</h2>
          </div>
          <textarea id="translatedText" class="full-text" readonly></textarea>
          <div class="segments" id="translatedSegments"></div>
          <div class="export-row" id="exportTranslation"></div>
        </div>
      </div>

      <div class="results-side">
        <div class="result-block ai-card is-hidden" id="summaryBlock">
          <div class="result-block__head">
            <h2><span class="ai-badge">✦ Özet</span></h2>
          </div>
          <div id="summaryContent" class="markdown-body"></div>
        </div>

        <div class="result-block ai-card is-hidden" id="polishBlock">
          <div class="result-block__head">
            <h2><span class="ai-badge">✎ İyileştirilmiş İçerik</span></h2>
            <div class="export-row export-row--inline" id="exportPolish"></div>
          </div>
          <div id="polishContent" class="markdown-body"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/assets/script.js?v=6"></script>
</body>
</html>
